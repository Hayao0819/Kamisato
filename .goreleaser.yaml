version: 2

project_name: ayaka-project

dist: dist

# Build contract: every binary is pure Go (the sqlite KV backend uses the
# cgo-free glebarez/modernc driver), so CGO_ENABLED=0 is pinned to keep the
# linux amd64+arm64 cross-compile self-contained — no cross C toolchain needed.
builds:
  - id: ayaka
    main: ./ayaka
    binary: ayaka
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w

  - id: ayato
    main: ./ayato
    binary: ayato
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w

  - id: lumine
    main: ./lumine
    binary: lumine
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w

  - id: thoma
    main: ./thoma
    binary: thoma
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w

archives:
  - id: default
    builds:
      - ayaka
      - ayato
      - lumine
      - thoma
    format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE.txt
      - README.md
    format_overrides:
      - goos: windows
        format: zip
    allow_different_binary_count: true

checksum:
  name_template: "checksums.txt"

snapshot:
  name_template: "{{ .Tag }}"

changelog:
  sort: desc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
