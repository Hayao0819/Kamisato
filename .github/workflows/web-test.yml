name: Lumine Web Test

on:
  push:
    paths:
      - 'lumine/web/**'
      - 'internal/protocol/**'
      - 'ayato/domain/**'
      - 'pkg/raiou/**'
      - '.github/workflows/web-test.yml'
  pull_request:
    paths:
      - 'lumine/web/**'
      - 'internal/protocol/**'
      - 'ayato/domain/**'
      - 'pkg/raiou/**'
      - '.github/workflows/web-test.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true

      - uses: volta-cli/action@v5
        with:
          node-version: '22'

      - name: Install corepack
        run: volta install corepack

      - name: Install dependencies
        working-directory: ./lumine/web
        run: pnpm install

      - name: Verify generated API types
        working-directory: ./lumine/web
        run: |
          pnpm run gen:types
          git diff --exit-code -- src/lib/generated

      - name: Typecheck (pnpm run typecheck)
        working-directory: ./lumine/web
        run: pnpm run typecheck

      - name: Test (pnpm run test)
        working-directory: ./lumine/web
        run: pnpm run test
