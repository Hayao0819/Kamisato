# Example stack: ayato + miko + lumine, plus a Docker-in-Docker build daemon.
# See README.md for roles and the walkthrough.

name: kamisato-example

services:
  # build-tmp is shared with miko at the same path so the build container can
  # bind-mount the sources miko writes there.
  dind:
    image: docker:dind
    privileged: true
    environment:
      DOCKER_TLS_CERTDIR: ""
    command: ["--host=tcp://0.0.0.0:2375", "--host=unix:///var/run/docker.sock", "--tls=false"]
    networks: [kamisato]
    volumes:
      - build-tmp:/build-tmp
      - dind-storage:/var/lib/docker
    healthcheck:
      test: ["CMD", "docker", "info"]
      interval: 5s
      timeout: 5s
      retries: 10

  miko:
    image: kamisato-example
    build:
      context: ..
      dockerfile: Dockerfile
    command: ["miko", "-c", "/config/miko_config.json"]
    environment:
      DOCKER_HOST: tcp://dind:2375
      TMPDIR: /build-tmp
    networks: [kamisato]
    volumes:
      - ./config:/config:ro
      - build-tmp:/build-tmp
      - miko-jobs:/data/jobs
    depends_on:
      dind:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8081/health"]
      interval: 5s
      timeout: 5s
      retries: 10

  ayato:
    image: kamisato-example
    build:
      context: ..
      dockerfile: Dockerfile
    command: ["ayato", "-c", "/config/ayato_config.json"]
    # Sign the kayo-facing AUR catalog so kayo can federate it (kayo pins this key
    # on its first sync). Demo seed only — make your own with `ayato aur keygen`.
    environment:
      AYATO_AUR_SIGNING_SEED: "iGFeYMtHugKh2CfrBy492T7VNocXWcxTpIUiy30NZn4="
    ports:
      - "127.0.0.1:8080:8080"
    networks: [kamisato]
    volumes:
      - ./config:/config:ro
      - ayato-data:/data
    depends_on:
      miko:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/unstable/hello"]
      interval: 5s
      timeout: 5s
      retries: 10

  lumine:
    image: kamisato-example
    build:
      context: ..
      dockerfile: Dockerfile
    command: ["lumine", "--addr", ":8080", "--ayato-url", "http://ayato:8080"]
    ports:
      - "127.0.0.1:3000:8080"
    networks: [kamisato]
    depends_on:
      ayato:
        condition: service_started

  # kayo: local aurweb-compatible overlay/router. It federates ayato's signed
  # catalog (ranked above the real AUR) and answers AUR-helper requests. Point a
  # helper at it, e.g. paru.conf: AurUrl = http://localhost:10713
  kayo:
    image: kamisato-example
    build:
      context: ..
      dockerfile: Dockerfile
    command: ["kamisato", "kayo", "-c", "/config/kayo_config.toml"]
    ports:
      - "127.0.0.1:10713:10713"
    networks: [kamisato]
    volumes:
      - ./config:/config:ro
      - kayo-data:/data
    depends_on:
      ayato:
        condition: service_healthy

networks:
  kamisato:

volumes:
  build-tmp:
  dind-storage:
  miko-jobs:
  ayato-data:
  kayo-data:
