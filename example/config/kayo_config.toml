# kayo — local aurweb-compatible overlay, wired for the example compose stack.
#
# kayo intervenes in AUR-helper resolution: it answers /rpc and git-clone like
# aurweb, resolving overlay and federated-ayato packages first and falling
# through to the real AUR for everything else. Point a helper at it:
#   paru.conf:  AurUrl = http://localhost:10713
#   yay:        yay --aururl http://localhost:10713 --aurrpcurl http://localhost:10713/rpc?

port = 10713
bind = "0.0.0.0"                 # reachable through the compose port mapping
cache_dir = "/data/cache"        # cloned overlay working trees
trust_store = "/data/trust.json" # durable; federated-ayato key pins live beside it
refresh_minutes = 30

[upstream]
enabled = true # fall through to the real AUR for unknown packages

# Federate the example ayato: kayo fetches its signed catalog and ranks it above
# the upstream AUR (below local git overlays). trust_on_first_use pins ayato's
# signing key on the first sync — ayato signs because AYATO_AUR_SIGNING_SEED is
# set on it in compose.yml. For a hard anchor instead, drop trust_on_first_use
# and set pubkey = "<base64 ed25519>" (printed by `ayato aur keygen`).
[[ayato]]
name = "example-ayato"
url = "http://ayato:8080"
priority = 50
trust_on_first_use = true

# A git overlay is the other source kind: an AUR-identical repo (PKGBUILD +
# .SRCINFO at the root), pinned to a commit. Uncomment to add one:
# [[overlays]]
# name = "my-pkgbuilds"
# url = "https://github.com/me/my-pkgbuilds.git"
# ref = "a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6e7f8a9b0"
# priority = 10
# maintainer = "me"
