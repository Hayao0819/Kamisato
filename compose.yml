# Single-VPS deployment of the closed Kamisato topology.
#
# Two-layer defense:
#   1. Network isolation. miko lives on the `internal` network, which is marked
#      `internal: true` (no route to the outside world) and is the only network
#      miko joins. Nothing outside this compose project can open a socket to it.
#   2. API key. Even on that closed network, miko still requires the shared key
#      (MIKO_API_KEYS) on every request. ayato sends it (AYATO_MIKO_API_KEY) on
#      each proxied call. If the network boundary ever leaks, the key is the
#      second wall.
#
# Why 127.0.0.1 for ayato's published port: Docker publishes ports by inserting
# its own DNAT rules ahead of the host firewall, so a plain "9000:9000" would be
# reachable from the internet even with ufw "deny" rules in place. Binding to
# 127.0.0.1 keeps ayato private to the host; a reverse proxy (Caddy/nginx) on
# the same host terminates TLS and forwards to it. miko publishes nothing at all.
#
# Config note: the koanf loader splits env vars on "_", so it cannot reach the
# underscore-bearing keys `miko.api_key` (ayato) and `api_keys` (miko). Those two
# secrets are therefore injected through a mounted config file rendered at start
# from an env var; everything else rides on the AYATO_*/MIKO_* env prefixes.

services:
  ayato:
    image: ghcr.io/hayao0819/kamisato:latest
    # The repo's Dockerfile ships standalone binaries; this deployment expects an
    # image whose entrypoint is the combined `kamisato` multiplexer so that
    # `kamisato ayato` / `kamisato miko` work. See deploy/README.md.
    restart: unless-stopped
    networks:
      - edge      # reachable by the host-local reverse proxy
      - internal  # reach miko over the closed network
    # Host-only. TLS is terminated by a reverse proxy in front of this port.
    ports:
      - "127.0.0.1:9000:9000"
    environment:
      AYATO_PORT: "9000"
      # Internal base URL of the build server (resolved on the `internal` network).
      AYATO_MIKO_URL: "http://miko:8081"
      # Shared secret ayato presents to miko. Supplied from the host env / a
      # secret store; rendered into the mounted config file by the entrypoint
      # because the env loader cannot map it onto the `api_key` koanf tag.
      AYATO_MIKO_API_KEY: "${KAMISATO_BUILD_API_KEY:?set KAMISATO_BUILD_API_KEY}"
      # Client-facing Basic auth (lumine / ayaka authenticate here, never to miko).
      AYATO_AUTH_USERNAME: "${AYATO_AUTH_USERNAME:-ayato}"
      AYATO_AUTH_PASSWORD: "${AYATO_AUTH_PASSWORD:?set AYATO_AUTH_PASSWORD}"
    entrypoint:
      - /bin/sh
      - -c
      - |
        cat > /tmp/ayato_config.json <<EOF
        { "miko": { "url": "$${AYATO_MIKO_URL}", "api_key": "$${AYATO_MIKO_API_KEY}" } }
        EOF
        exec kamisato ayato -c /tmp/ayato_config.json

  miko:
    image: ghcr.io/hayao0819/kamisato:latest
    restart: unless-stopped
    networks:
      - internal  # ONLY the closed network: no path from outside the project
    # No `ports:` — never published. Other services on `internal` reach it here.
    expose:
      - "8081"
    # Docker-out-of-Docker: miko drives the host's Docker daemon to run builds.
    # WARNING: a mounted docker.sock is equivalent to unconfined host root. Anyone
    # who can submit a build to miko can escape to the host. This is the reason
    # miko is sealed behind the closed network AND the API key — keep it that way.
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      MIKO_PORT: "8081"
      MIKO_EXECUTOR: "container"
      # Same shared secret as AYATO_MIKO_API_KEY above. Like ayato's key, it is
      # written into the mounted config (the `api_keys` tag is unreachable via env).
      KAMISATO_BUILD_API_KEY: "${KAMISATO_BUILD_API_KEY:?set KAMISATO_BUILD_API_KEY}"
    entrypoint:
      - /bin/sh
      - -c
      - |
        cat > /tmp/miko_config.json <<EOF
        { "api_keys": ["$${KAMISATO_BUILD_API_KEY}"] }
        EOF
        exec kamisato miko -c /tmp/miko_config.json

networks:
  edge:
    driver: bridge
  internal:
    # No external connectivity: miko cannot reach the internet and nothing
    # outside the project can reach miko.
    internal: true
