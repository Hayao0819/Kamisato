version: "2"

run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - gosec
  settings:
    staticcheck:
      checks:
        - -QF1001
    errcheck:
      exclude-functions:
        - (io.Closer).Close
        - (io.ReadCloser).Close
        - (*os.File).Close
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln
        - os.RemoveAll
        - (*github.com/Hayao0819/Kamisato/ayato/stream.FileStream).Close
        - (*github.com/docker/docker/client.Client).Close
    gosec:
      # G304 (file inclusion via variable) is not taint-aware and fires on every
      # non-constant path. This build/distribution tool composes every path itself
      # (validated repo components, config, build artifacts, resolved binaries) and
      # has no request-parameter-to-open sink. Real traversal is caught by the
      # taint-aware G703 (kept on) and by the tested blob.ValidatePathComponent.
      excludes:
        - G304
  exclusions:
    rules:
      # gosec guards the shipping binary; the test suite deliberately uses weak
      # crypto (forgery-rejection tests), subprocess oracles, and lax fixture
      # perms, which are not deployment risks. errcheck still runs on tests.
      - path: _test\.go
        linters:
          - gosec
