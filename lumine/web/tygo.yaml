# TypeScript types generated from the Go truth types so the client cannot drift.
# Regenerate from lumine/web with: pnpm gen:types
# (or: go run github.com/gzuidhof/tygo@latest generate)
packages:
  - path: "github.com/Hayao0819/Kamisato/ayato/domain"
    output_path: "src/lib/generated/ayato_domain.ts"
    include_files: ["repo.go", "features.go"]
  - path: "github.com/Hayao0819/Kamisato/internal/protocol"
    output_path: "src/lib/generated/miko_domain.ts"
    include_files: ["miko.go"]
