name: Upload to ayato
description: Publish built package files to an ayato server, authenticating with a CI API key or a GitHub OIDC token.

inputs:
  server:
    description: ayato base URL, e.g. https://repo.example.com
    required: true
  repo:
    description: Repository name on ayato, e.g. alterlinux
    required: true
  files:
    description: Package files to upload. Space-separated; globs are expanded (e.g. "out/alterlinux/**/*.pkg.tar.*"). A matching .sig is sent with its package.
    required: true
  auth:
    description: 'CI credential type: "apikey" or "oidc".'
    default: apikey
  api_key:
    description: API key for auth=apikey. Pass a secret.
    default: ""
  audience:
    description: OIDC audience for auth=oidc; must equal ayato's auth.ci.github_oidc.audience.
    default: ""

runs:
  using: composite
  steps:
    - shell: bash
      env:
        IN_SERVER: ${{ inputs.server }}
        IN_REPO: ${{ inputs.repo }}
        IN_FILES: ${{ inputs.files }}
        IN_AUTH: ${{ inputs.auth }}
        IN_API_KEY: ${{ inputs.api_key }}
        IN_AUDIENCE: ${{ inputs.audience }}
      run: |
        set -euo pipefail
        shopt -s globstar nullglob

        # Never send a publish credential over cleartext. Require https; allow
        # http only for an anchored localhost (testing), not http://localhost.evil.
        case "$IN_SERVER" in
          https://*) ;;
          http://localhost | http://localhost:* | http://127.0.0.1 | http://127.0.0.1:*) ;;
          *) echo "::error::server must use https (http is allowed only for localhost)"; exit 1 ;;
        esac

        # Keep the credential out of the process argv: curl reads the auth header
        # from a config file (-K), not the command line.
        curlcfg="$(mktemp)"
        trap 'rm -f "$curlcfg"' EXIT

        case "$IN_AUTH" in
          apikey)
            [ -n "$IN_API_KEY" ] || { echo "::error::api_key is required for auth=apikey"; exit 1; }
            printf 'header = "X-API-Key: %s"\n' "$IN_API_KEY" >"$curlcfg"
            ;;
          oidc)
            [ -n "$IN_AUDIENCE" ] || { echo "::error::audience is required for auth=oidc"; exit 1; }
            [ -n "${ACTIONS_ID_TOKEN_REQUEST_URL:-}" ] || { echo "::error::no OIDC endpoint; the calling job needs 'permissions: id-token: write'"; exit 1; }
            jwt="$(curl -sSL \
              -H "Authorization: Bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
              "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=${IN_AUDIENCE}" | jq -r '.value')"
            [ -n "$jwt" ] && [ "$jwt" != "null" ] || { echo "::error::failed to obtain an OIDC token"; exit 1; }
            printf 'header = "Authorization: Bearer %s"\n' "$jwt" >"$curlcfg"
            ;;
          *)
            echo "::error::auth must be 'apikey' or 'oidc'"
            exit 1
            ;;
        esac

        files=()
        for pat in $IN_FILES; do files+=($pat); done
        [ ${#files[@]} -gt 0 ] || { echo "::error::no package files matched: $IN_FILES"; exit 1; }

        base="${IN_SERVER%/}/api/unstable/repos/${IN_REPO}/packages"

        # The packages to publish (drop the .sig sidecars; each rides its package).
        pkgs=()
        for f in "${files[@]}"; do
          case "$f" in *.sig) continue ;; esac
          pkgs+=("$f")
        done
        [ ${#pkgs[@]} -gt 0 ] || { echo "::error::no package files matched: $IN_FILES"; exit 1; }

        # multipart_upload publishes via the classic multipart POST; used directly by
        # a backend that cannot presign, and as the fallback when presign returns 501.
        multipart_upload() {
          for f in "${pkgs[@]}"; do
            form=(-F "package=@${f}")
            [ -f "${f}.sig" ] && form+=(-F "signature=@${f}.sig")
            echo "uploading $(basename "$f")"
            code="$(curl -sS -o /dev/null -w '%{http_code}' -X POST -K "$curlcfg" "${form[@]}" "$base")"
            [ "$code" = "200" ] || { echo "::error::upload failed for $(basename "$f") (HTTP $code)"; exit 1; }
          done
        }

        # Request a presigned direct-to-store PUT URL for every package and its .sig,
        # so a package larger than the server's request-body limit can be uploaded
        # without going through the server.
        req="$(
          for f in "${pkgs[@]}"; do
            basename "$f"
            [ -f "${f}.sig" ] && basename "${f}.sig"
          done | jq -R . | jq -s '{files: .}'
        )"

        presign_resp="$(mktemp)"
        trap 'rm -f "$curlcfg" "$presign_resp"' EXIT
        code="$(curl -sS -o "$presign_resp" -w '%{http_code}' -X POST -K "$curlcfg" \
          -H 'Content-Type: application/json' -d "$req" "${base}/presign")"

        if [ "$code" = "501" ]; then
          echo "presigned upload unavailable; falling back to multipart POST"
          multipart_upload
        elif [ "$code" = "200" ]; then
          # PUT each file straight to its presigned URL. The URL is pre-authorized, so
          # no auth config is attached to the PUT.
          for f in "${files[@]}"; do
            name="$(basename "$f")"
            put_url="$(jq -r --arg n "$name" '.urls[$n] // empty' "$presign_resp")"
            [ -n "$put_url" ] || { echo "::error::no presigned URL returned for $name"; exit 1; }
            echo "uploading $name (direct)"
            put_code="$(curl -sS -o /dev/null -w '%{http_code}' -T "$f" "$put_url")"
            case "$put_code" in
              2??) ;;
              *) echo "::error::direct upload failed for $name (HTTP $put_code)"; exit 1 ;;
            esac
          done

          # Finalize: the server validates and registers the objects just PUT.
          fin="$(printf '%s\n' "${pkgs[@]}" | xargs -n1 basename | jq -R . | jq -s '{packages: .}')"
          fin_code="$(curl -sS -o /dev/null -w '%{http_code}' -X POST -K "$curlcfg" \
            -H 'Content-Type: application/json' -d "$fin" "${base}/finalize")"
          [ "$fin_code" = "200" ] || { echo "::error::finalize failed (HTTP $fin_code)"; exit 1; }
        else
          echo "::error::presign request failed (HTTP $code)"
          cat "$presign_resp" || true
          exit 1
        fi
